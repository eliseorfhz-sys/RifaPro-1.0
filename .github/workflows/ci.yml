name: CI

on:
  push:
    branches: ["**"]
  pull_request:
    branches: ["**"]

jobs:
  validate:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Validate Python syntax
        run: |
          python -m py_compile app.py wheel_component.py

      - name: Block secrets in git
        shell: bash
        run: |
          set -euo pipefail
          if git ls-files | grep -E '(^|/)\.streamlit/secrets\.toml$'; then
            echo "Error: Se detectó secrets.toml versionado."
            exit 1
          fi
          echo "OK: no secret files tracked."
